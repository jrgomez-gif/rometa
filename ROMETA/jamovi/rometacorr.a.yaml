name: rometaCorr
title: 'ROMETA: Meta-analysis of Correlations'
menuGroup: ROMETA
menuTitle: Correlations
version: '1.0.0'
jas: '1.2'

description:
    main: >
        Meta-analysis of correlation coefficients across studies, using Fisher's
        z transformation. Pooling and reporting aligned with the Cochrane
        Handbook, PRISMA and MOOSE recommendations, built on top of the metafor
        package. Independent module; not affiliated with or endorsed by Cochrane.

options:
  - name: data
    type: Data

  - name: r
    title: Correlation Coefficient (r)
    type: Variable
    suggested: [continuous]
    permitted: [numeric]

  - name: n
    title: Sample Size (N)
    type: Variable
    suggested: [continuous]
    permitted: [numeric]

  - name: labels
    title: Study Labels
    type: Variable
    suggested: [nominal, ordinal]

  - name: subgroup
    title: Subgroup Variable (Categorical)
    type: Variable
    suggested: [nominal, ordinal]

  - name: moderators
    title: Meta-Regression Moderators
    type: Variables
    suggested: [continuous, nominal, ordinal]

  - name: measure
    title: Correlation Transformation
    type: List
    options:
      - { name: ZCOR, title: "Fisher's z Transformation (ZCOR)" }
      - { name: COR,  title: 'Raw Correlation (COR)' }
      - { name: UCOR, title: 'Unbiased Correlation (UCOR)' }
    default: ZCOR

  - name: model
    title: Model
    type: List
    options:
      - { name: fixed,  title: 'Fixed effect (common effect)' }
      - { name: random, title: 'Random effects' }
    default: random

  - name: tau2Method
    title: Heterogeneity (τ²) estimator
    type: List
    options:
      - { name: REML, title: 'Restricted ML (REML)' }
      - { name: DL,   title: 'DerSimonian-Laird (RevMan)' }
      - { name: ML,   title: 'Maximum likelihood (ML)' }
      - { name: PM,   title: 'Paule-Mandel' }
      - { name: SJ,   title: 'Sidik-Jonkman' }
    default: REML

  - name: hksj
    title: Apply Hartung-Knapp-Sidik-Jonkman adjustment
    type: Bool
    default: true

  - name: predInt
    title: Prediction interval (random effects)
    type: Bool
    default: false

  - name: subgroupModel
    title: Subgroup variance assumption (random effects only)
    type: List
    options:
      - { name: independent, title: 'Independent (separate τ²)' }
      - { name: pooled,      title: 'Pooled (common τ², RevMan style)' }
    default: independent

  - name: pubBias
    title: Assess publication bias (funnel, Egger, Begg)
    type: Bool
    default: false

  - name: trimFill
    title: Trim & Fill imputation (sensitivity analysis)
    type: Bool
    default: false

  # ---- plots ----
  - name: forest
    title: Forest plot
    type: Bool
    default: true

  - name: forestStyle
    title: Forest Plot Style
    type: List
    options:
      - { name: modern,  title: 'Modern (forestploter)' }
      - { name: classic, title: 'Classic (metafor)' }
    default: modern

  - name: forestTheme
    title: Forest Plot Theme
    type: List
    options:
      - { name: coffee, title: 'Coffee Brown' }
      - { name: gray,   title: 'Grayscale' }
    default: coffee
