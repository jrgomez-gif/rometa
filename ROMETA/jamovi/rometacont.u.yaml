title: 'ROMETA: Meta-analysis of Continuous Data'
name: rometaCont
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Intervention Group - Mean
        children:
          - { type: VariablesListBox, name: m1, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Intervention Group - SD
        children:
          - { type: VariablesListBox, name: sd1, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Intervention Group - N
        children:
          - { type: VariablesListBox, name: n1, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Control Group - Mean
        children:
          - { type: VariablesListBox, name: m2, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Control Group - SD
        children:
          - { type: VariablesListBox, name: sd2, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Control Group - N
        children:
          - { type: VariablesListBox, name: n2, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Study Labels
        children:
          - { type: VariablesListBox, name: labels, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Subgroup Variable (Categorical)
        children:
          - { type: VariablesListBox, name: subgroup, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Meta-Regression Moderators
        children:
          - { type: VariablesListBox, name: moderators, isTarget: true }

  - type: CollapseBox
    label: Effect Size & Model
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: ComboBox, name: measure }
          - { type: ComboBox, name: model }
          - { type: ComboBox, name: tau2Method, enable: (model:random) }
          - { type: CheckBox, name: hksj, enable: (model:random) }
          - { type: CheckBox, name: predInt, enable: (model:random) }

  - type: CollapseBox
    label: Subgroups & Moderators
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: ComboBox, name: subgroupModel, enable: (model:random) }

  - type: CollapseBox
    label: Publication Bias
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: CheckBox, name: pubBias }
          - { type: CheckBox, name: trimFill, enable: (pubBias) }

  - type: CollapseBox
    label: Plots
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: CheckBox, name: forest }
          - { type: ComboBox, name: forestStyle, enable: (forest) }
          - { type: ComboBox, name: forestTheme, enable: (forest) }
