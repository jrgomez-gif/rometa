name: rometaCont
title: 'ROMETA: Meta-analysis of Continuous Data'
jrs: '1.1'
items:
  - name: modelTable
    title: Meta-Analysis Summary (Overall Effect)
    type: Table
    rows: 1
    clearWith: [m1, sd1, n1, m2, sd2, n2, measure, model, tau2Method, hksj, predInt]
    columns:
      - { name: measure,    title: Effect,            type: text }
      - { name: k,          title: 'k',               type: integer }
      - { name: estimate,   title: Estimate,          type: number, format: 'zto' }
      - { name: se,         title: SE,                type: number, format: 'zto' }
      - { name: cil,        title: Lower 95% CI,      type: number, format: 'zto' }
      - { name: ciu,        title: Upper 95% CI,      type: number, format: 'zto' }
      - { name: p,          title: 'p',               type: number, format: 'zto,pvalue' }
      - { name: i2,         title: 'I² (%)',          type: number, format: 'zto' }
      - { name: tau2,       title: 'τ²',              type: number, format: 'zto' }
      - { name: qp,         title: 'Q-test (p)',      type: number, format: 'zto,pvalue' }
      - { name: predLower,  title: 'Pred. Lower',     type: number, format: 'zto', visible: '(predInt)' }
      - { name: predUpper,  title: 'Pred. Upper',     type: number, format: 'zto', visible: '(predInt)' }

  - name: subgroupTable
    title: Subgroup Analysis
    type: Table
    visible: (subgroup)
    clearWith: [m1, sd1, n1, m2, sd2, n2, subgroup, subgroupModel, measure, model, tau2Method, hksj]
    columns:
      - { name: group,    title: Subgroup,     type: text }
      - { name: k,        title: 'k',          type: integer }
      - { name: estimate, title: Estimate,     type: number, format: 'zto' }
      - { name: cil,      title: Lower 95% CI, type: number, format: 'zto' }
      - { name: ciu,      title: Upper 95% CI, type: number, format: 'zto' }
      - { name: p,        title: 'p',          type: number, format: 'zto,pvalue' }
      - { name: i2,       title: 'I² (%)',     type: number, format: 'zto' }

  - name: subgroupTestTable
    title: Test for Subgroup Differences
    type: Table
    rows: 1
    visible: (subgroup)
    clearWith: [m1, sd1, n1, m2, sd2, n2, subgroup, subgroupModel, measure, model, tau2Method]
    columns:
      - { name: qb,   title: 'Q (between)', type: number, format: 'zto' }
      - { name: qbdf, title: 'df',          type: integer }
      - { name: qbp,  title: 'p-value',     type: number, format: 'zto,pvalue' }

  - name: forestPlot
    title: Forest Plot
    type: Image
    width: 720
    height: 550
    renderFun: .forestPlot
    visible: (forest)
    clearWith: [m1, sd1, n1, m2, sd2, n2, labels, subgroup, subgroupModel, measure, model, tau2Method, hksj, predInt, forestStyle, forestTheme]

  - name: biasTable
    title: Publication Bias Diagnostics
    type: Table
    visible: (pubBias)
    clearWith: [m1, sd1, n1, m2, sd2, n2, measure, model, tau2Method]
    columns:
      - { name: test,  title: Test,      type: text }
      - { name: value, title: Statistic, type: number, format: 'zto' }
      - { name: p,     title: 'p-value', type: number, format: 'zto,pvalue' }

  - name: trimFillTable
    title: Trim & Fill (Sensitivity Analysis)
    type: Table
    visible: (trimFill)
    clearWith: [m1, sd1, n1, m2, sd2, n2, measure, model, tau2Method, trimFill]
    columns:
      - { name: test,     title: Term,           type: text }
      - { name: k,        title: 'Imputed (k0)', type: integer }
      - { name: estimate, title: Estimate,       type: number, format: 'zto' }
      - { name: cil,      title: Lower 95% CI,   type: number, format: 'zto' }
      - { name: ciu,      title: Upper 95% CI,   type: number, format: 'zto' }
      - { name: p,        title: 'p',            type: number, format: 'zto,pvalue' }

  - name: funnelPlot
    title: Funnel Plot
    type: Image
    visible: (pubBias)
    width: 600
    height: 500
    renderFun: .funnelPlot
    clearWith: [m1, sd1, n1, m2, sd2, n2, measure, model, tau2Method, trimFill]

  - name: metaRegTable
    title: Meta-Regression Coefficients
    type: Table
    visible: (moderators)
    clearWith: [m1, sd1, n1, m2, sd2, n2, moderators, measure, model, tau2Method, hksj]
    columns:
      - { name: term,     title: Term,         type: text }
      - { name: estimate, title: Estimate,     type: number, format: 'zto' }
      - { name: se,       title: SE,           type: number, format: 'zto' }
      - { name: cil,      title: Lower 95% CI, type: number, format: 'zto' }
      - { name: ciu,      title: Upper 95% CI, type: number, format: 'zto' }
      - { name: p,        title: 'p',          type: number, format: 'zto,pvalue' }

  - name: metaRegFitTable
    title: Meta-Regression Model Fit
    type: Table
    rows: 1
    visible: (moderators)
    clearWith: [m1, sd1, n1, m2, sd2, n2, moderators, measure, model, tau2Method, hksj]
    columns:
      - { name: qm,      title: 'Test of Moderators (Q_M)', type: number, format: 'zto' }
      - { name: qmp,     title: 'p (Q_M)',                  type: number, format: 'zto,pvalue' }
      - { name: qe,      title: 'Residual Q_E',             type: number, format: 'zto' }
      - { name: qep,     title: 'p (Q_E)',                  type: number, format: 'zto,pvalue' }
      - { name: i2res,   title: 'Residual I² (%)',          type: number, format: 'zto' }
      - { name: tau2res, title: 'Residual τ²',              type: number, format: 'zto' }
      - { name: r2,      title: 'R² (%)',                   type: number, format: 'zto' }

  - name: bubblePlot
    title: Bubble Plot (Meta-Regression)
    type: Image
    visible: (moderators)
    width: 600
    height: 500
    renderFun: .bubblePlot
    clearWith: [m1, sd1, n1, m2, sd2, n2, moderators, measure, model, tau2Method]

refs:
    - 'Viechtbauer, W. (2010). Conducting meta-analyses in R with the metafor package. Journal of Statistical Software, 36(3), 1-48.'
    - 'Higgins JPT, Thomas J, Chandler J, et al. (eds). Cochrane Handbook for Systematic Reviews of Interventions. Cochrane, current version (training.cochrane.org/handbook).'
