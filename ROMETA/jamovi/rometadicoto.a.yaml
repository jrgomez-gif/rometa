---
name: rometaDicoto
title: 'ROMETA: Meta-analysis of Dichotomous Outcomes (2×2)'
menuGroup: ROMETA
menuTitle: Dichotomous Outcomes (2×2)
menuSubtitle: Risk Ratio / Odds Ratio / Risk Difference
version: '1.0.0'
jas: '1.2'

description:
    main: >
        Meta-analysis of dichotomous (binary) outcomes comparing a treatment/exposed
        arm against a control arm. Implements pooling methods aligned with the Cochrane
        Handbook and RevMan (Mantel-Haenszel, Peto, inverse-variance) on top of the
        metafor package. Independent module; not affiliated with or endorsed by Cochrane.

options:
    - name: data
      type: Data

    # ---- 2x2 inputs (events + totals per arm) ----
    - name: te
      title: Events (Treatment / Exposed)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: tn
      title: Total N (Treatment / Exposed)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: ce
      title: Events (Control)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: cn
      title: Total N (Control)
      type: Variable
      suggested: [continuous]
      permitted: [numeric]

    - name: labels
      title: Study Labels
      type: Variable
      suggested: [nominal, ordinal]

    - name: subgroup
      title: Subgroup Variable (Categorical)
      type: Variable
      suggested: [nominal, ordinal]

    - name: moderators
      title: Meta-Regression Moderators
      type: Variables
      suggested: [continuous, nominal, ordinal]

    # ---- effect measure ----
    - name: measure
      title: Effect Measure
      type: List
      options:
        - { name: RR,   title: Risk Ratio (RR) }
        - { name: OR,   title: Odds Ratio (OR) }
        - { name: RD,   title: Risk Difference (RD) }
        - { name: PETO, title: Peto Odds Ratio }
      default: RR

    # ---- model ----
    - name: model
      title: Model
      type: List
      options:
        - { name: fixed,  title: Fixed effect (common effect) }
        - { name: random, title: Random effects }
      default: random

    - name: feMethod
      title: Fixed-effect pooling
      type: List
      options:
        - { name: MH, title: 'Mantel-Haenszel (RevMan default)' }
        - { name: IV, title: 'Inverse variance' }
      default: MH

    - name: tau2Method
      title: Heterogeneity (τ²) estimator
      type: List
      options:
        - { name: DL,   title: 'DerSimonian-Laird (RevMan)' }
        - { name: REML, title: 'Restricted ML (REML)' }
        - { name: ML,   title: 'Maximum likelihood (ML)' }
        - { name: PM,   title: 'Paule-Mandel' }
        - { name: SJ,   title: 'Sidik-Jonkman' }
      default: REML

    - name: hksj
      title: Apply Hartung-Knapp-Sidik-Jonkman adjustment
      type: Bool
      default: false

    - name: cc
      title: Continuity correction (zero cells)
      type: List
      options:
        - { name: only0, title: 'Add 0.5 only to studies with a zero cell' }
        - { name: all,   title: 'Add 0.5 to all studies' }
        - { name: none,  title: 'None (Cochrane M-H default)' }
      default: only0

    - name: predInt
      title: Prediction interval (random effects)
      type: Bool
      default: false

    # ---- subgroups ----
    - name: subgroupModel
      title: Subgroup variance assumption (random effects only)
      type: List
      options:
        - { name: independent, title: 'Independent (separate τ²)' }
        - { name: pooled,      title: 'Pooled (common τ², RevMan style)' }
      default: independent

    # ---- publication bias ----
    - name: pubBias
      title: Assess publication bias (funnel, Egger, Begg)
      type: Bool
      default: false

    - name: trimFill
      title: Trim & Fill imputation (sensitivity analysis)
      type: Bool
      default: false

    # ---- plots ----
    - name: forest
      title: Forest plot
      type: Bool
      default: true

    - name: forestStyle
      title: Forest Plot Style
      type: List
      options:
        - { name: modern, title: 'Modern (forestploter)' }
        - { name: classic, title: 'Classic (metafor)' }
      default: modern

    - name: forestTheme
      title: Forest Plot Theme
      type: List
      options:
        - { name: blue, title: 'Deep Blue' }
        - { name: gray, title: 'Grayscale' }
      default: blue
...