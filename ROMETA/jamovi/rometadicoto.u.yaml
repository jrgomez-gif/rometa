title: 'Dichotomous Outcomes (2×2)'
name: rometaDicoto
jus: '3.0'
stage: 0
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Events (Treatment / Exposed)
        children:
          - { type: VariablesListBox, name: te, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Total N (Treatment / Exposed)
        children:
          - { type: VariablesListBox, name: tn, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Events (Control)
        children:
          - { type: VariablesListBox, name: ce, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Total N (Control)
        children:
          - { type: VariablesListBox, name: cn, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Study Labels
        children:
          - { type: VariablesListBox, name: labels, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Subgroup Variable
        children:
          - { type: VariablesListBox, name: subgroup, maxItemCount: 1, isTarget: true }
      - type: TargetLayoutBox
        label: Meta-Regression Moderators
        children:
          - { type: VariablesListBox, name: moderators, isTarget: true }

  - type: CollapseBox
    label: Effect Size & Model
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: ComboBox, name: measure }
          - { type: ComboBox, name: model }
          - { type: ComboBox, name: feMethod, enable: (model:fixed) }
          - { type: ComboBox, name: tau2Method, enable: (model:random) }
          - { type: CheckBox, name: hksj, enable: (model:random) }
          - { type: ComboBox, name: cc }
          - { type: CheckBox, name: predInt, enable: (model:random) }

  - type: CollapseBox
    label: Subgroups & Moderators
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: ComboBox, name: subgroupModel, enable: (model:random) }

  - type: CollapseBox
    label: Publication Bias
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: CheckBox, name: pubBias }
          - { type: CheckBox, name: trimFill, enable: (pubBias) }

  - type: CollapseBox
    label: Plots
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - { type: CheckBox, name: forest }
          - { type: ComboBox, name: forestStyle, enable: (forest) }
          - { type: ComboBox, name: forestTheme, enable: (forest) }