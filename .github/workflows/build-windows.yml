name: Build ROMETA for Windows

# Se ejecuta manualmente desde la pestaña "Actions" de GitHub,
# o automáticamente al hacer push de un tag de versión (ej. v2.3.0)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.0'   # ajustar si tu jamovi usa otra versión menor
          rtools-version: '45' # Rtools que corresponde a R 4.5.x

      - name: Set up Pandoc (a veces requerido por jmvtools)
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies for R packages
        run: |
          Rscript -e "install.packages('remotes', repos = 'https://cran.r-project.org')"

      - name: Install jmvcore (from CRAN)
        run: |
          Rscript -e "install.packages('jmvcore', repos = 'https://cran.r-project.org')"

      - name: Install node + jmvtools from source (repo.jamovi.org)
        run: |
          Rscript -e "install.packages(c('node','jmvtools'), repos = c('https://repo.jamovi.org','https://cran.r-project.org'), type = 'source')"

      - name: Verify jmvtools installed correctly
        run: |
          Rscript -e "if (!requireNamespace('jmvtools', quietly = TRUE)) stop('jmvtools NOT installed') else cat('jmvtools OK, version:', as.character(packageVersion('jmvtools')), '\n')"

      - name: Install package dependencies (metafor, forestploter, R6, etc.)
        run: |
          Rscript -e "install.packages(c('R6','metafor','forestploter'), repos = 'https://cran.r-project.org')"

      - name: Download jamovi Desktop installer
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://www.jamovi.org/downloads/jamovi-2.7.37.0-win64.exe" -OutFile "jamovi-installer.exe" -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -UseBasicParsing

      - name: Verify installer is a valid executable
        shell: pwsh
        run: |
          $bytes = [System.IO.File]::ReadAllBytes("jamovi-installer.exe")
          $size = $bytes.Length
          Write-Host "Downloaded file size: $size bytes"
          $header = [System.Text.Encoding]::ASCII.GetString($bytes[0..1])
          if ($header -ne "MZ") {
            Write-Host "--- File is NOT a valid EXE. First 500 bytes as text: ---"
            [System.Text.Encoding]::UTF8.GetString($bytes[0..([Math]::Min(500, $size-1))])
            throw "Downloaded file is not a valid Windows executable (missing MZ header). See content above."
          }
          Write-Host "Valid EXE header confirmed (MZ)."

      - name: Install jamovi Desktop silently
        shell: pwsh
        run: |
          Start-Process -FilePath ".\jamovi-installer.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 10

      - name: Locate jamovi installation folder
        id: jamovi_home
        shell: pwsh
        run: |
          $found = Get-ChildItem "C:\Program Files\jamovi*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $found) {
            $found = Get-ChildItem "C:\Program Files (x86)\jamovi*" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $found) { throw "jamovi installation folder not found" }
          Write-Host "jamovi found at: $($found.FullName)"
          echo "path=$($found.FullName)" >> $env:GITHUB_OUTPUT

      - name: Prepare jamovi module (generates .b.R base classes / headers)
        shell: pwsh
        run: |
          Rscript -e "jmvtools::prepare('.', home='${{ steps.jamovi_home.outputs.path }}')"

      - name: Build .jmo package
        shell: pwsh
        run: |
          Rscript -e "jmvtools::install('.', home='${{ steps.jamovi_home.outputs.path }}')"

      - name: Locate built .jmo
        id: locate
        shell: bash
        run: |
          FILE=$(find . -maxdepth 2 -iname "*.jmo" | head -n 1)
          echo "Found: $FILE"
          echo "jmo_path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Upload .jmo as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ROMETA-windows-jmo
          path: ${{ steps.locate.outputs.jmo_path }}
          if-no-files-found: error
